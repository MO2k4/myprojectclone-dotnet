# One section per check (keyed by check id). Set `enabled = false, reason = "..."`
# to opt out of a check. Unknown ids are rejected by `quality check`.

[checks."max-lines"]
enabled = true
threshold = 400

[checks."bypass-directive-check"]
enabled = true

[checks."env-exhaustiveness"]
enabled = true

[checks."unused-nuget-packages"]
enabled = true

[checks."ef-migrations-drift"]
enabled = true

[checks."lockfile-integrity"]
enabled = true

[checks."license-check"]
enabled = true
denylist = ["GPL-3.0", "AGPL-3.0"]
