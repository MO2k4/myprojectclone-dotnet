rules:
  - id: sensitive-data-in-log
    languages: [csharp]
    message: |
      Log call references a sensitive identifier (password/token/etc.).
      Redact, hash, or omit before logging.
    severity: ERROR
    # Match the log call structurally so semgrep balances the argument list's
    # parens, then AND a keyword regex. A flat `\.Log...\([^)]*\b(keyword)\b`
    # regex truncated at the first ')' inside the message (e.g. "failed (attempt
    # #{n}): password ..."), and as a `|` block scalar it carried a trailing
    # newline that made it match nothing at all.
    patterns:
      - pattern-either:
          - pattern: $LOGGER.LogTrace(...)
          - pattern: $LOGGER.LogDebug(...)
          - pattern: $LOGGER.LogInformation(...)
          - pattern: $LOGGER.LogWarning(...)
          - pattern: $LOGGER.LogError(...)
          - pattern: $LOGGER.LogCritical(...)
      - pattern-regex: '(?i)\b(password|secret|token|apikey|api_key|bearer|authorization|credit.?card|ssn|pii)\b'

  - id: console-write-outside-allowed
    languages: [csharp]
    message: Console.Write* is banned outside Program.cs and tools/Quality.Cli.
    severity: ERROR
    pattern-either:
      - pattern: Console.WriteLine(...)
      - pattern: Console.Error.WriteLine(...)
      - pattern: Console.Write(...)
    paths:
      exclude:
        - "**/Program.cs"
        - "tools/Quality.Cli/**"
