name: quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality-native:
    runs-on: ubuntu-latest
    env:
      # dotnet-project-licenses 2.7.1 (license-check hook) ships net7.0 as its
      # highest TFM with no roll-forward. Runners only have 9.0 from global.json;
      # this lets the host roll the tool forward across majors. Applies to every
      # `dotnet` invocation in this job (pre-commit + `dotnet quality pr-check`).
      DOTNET_ROLL_FORWARD: LatestMajor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            ~/.dotnet/tools
          key: ${{ runner.os }}-nuget-${{ hashFiles('.config/dotnet-tools.json', '**/packages.lock.json') }}
      - name: Pack dotnet-quality for tool restore
        run: dotnet pack tools/Quality.Cli/Quality.Cli.csproj -o ./artifacts -c Release
      - run: dotnet tool restore
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install "setuptools<81" pre-commit==3.8.0 semgrep==1.92.0
      - name: Install external scanners (trivy, jscpd)
        run: |
          # Pinned to match docker/Dockerfile.quality.
          curl -sSL https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.tar.gz \
            | sudo tar -xz -C /usr/local/bin trivy
          sudo npm install -g jscpd@4.0.5
      - uses: pre-commit/action@v3.0.1
        env:
          # `no-commit-to-branch` is a client-side guard against direct commits
          # to main. CI itself runs on main (push event) so the hook would fire
          # on every merge — skip it server-side.
          SKIP: no-commit-to-branch
      - run: dotnet quality pr-check

  quality-docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Build pinned image
        run: docker build -f docker/Dockerfile.quality -t quality-tools:pinned .
      - name: Run pr-check inside container
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo quality-tools:pinned \
            -lc 'dotnet pack tools/Quality.Cli/Quality.Cli.csproj -o ./artifacts -c Release && dotnet tool restore && dotnet quality pr-check'
